name: Bug Report
description: Report a bug or unexpected behavior
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Detailed steps to reproduce the issue.
      placeholder: |
        1. Run `tiptop-run --task "..."`
        2. Observe error in ...
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS, GPU, CUDA version.
      placeholder: "Ubuntu 22.04, RTX 4090, CUDA 12.4"
    validations:
      required: true
  - type: input
    id: robot
    attributes:
      label: Robot / Simulation Platform
      description: Which robot or simulator are you using?
      placeholder: "Franka Panda, UR5e, Trossen WidowX, simulation, etc."
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant error messages or logs.
      render: shell
